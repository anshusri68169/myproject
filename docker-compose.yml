version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: quicklift-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - quicklift-network

  redis:
    image: redis:7-alpine
    container_name: quicklift-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quicklift-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quicklift-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/quicklift?authSource=admin
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - quicklift-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quicklift-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - quicklift-network

volumes:
  mongodb_data:
  redis_data:

networks:
  quicklift-network:
    driver: bridge
